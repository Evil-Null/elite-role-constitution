name: Integrity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity:
    name: SYSTEM_INTEGRITY_CHECK.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify shellcheck is available
        run: shellcheck --version

      - name: Static-analyze SYSTEM_INTEGRITY_CHECK.sh
        run: shellcheck SYSTEM_INTEGRITY_CHECK.sh

      - name: Run integrity checks
        run: bash SYSTEM_INTEGRITY_CHECK.sh
