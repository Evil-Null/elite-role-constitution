name: Integrity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity:
    name: SYSTEM_INTEGRITY_CHECK.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify shellcheck is available
        run: shellcheck --version

      - name: Install python yaml for generator
        run: python3 -m pip install --quiet pyyaml

      - name: Static-analyze every shell script in the repo
        run: shellcheck SYSTEM_INTEGRITY_CHECK.sh install.sh generate.sh .kimi/hooks/*.sh

      - name: Verify canon and derived files are in sync
        run: |
          set -e
          bash generate.sh --check
          # Belt-and-braces: assert no diff after a real run.
          bash generate.sh
          if ! git diff --exit-code; then
            echo "FAIL: generate.sh produced uncommitted diffs."
            echo "Run 'bash generate.sh' locally and commit the result,"
            echo "or revert manual edits to canon-generated blocks."
            exit 1
          fi
          echo "Canon to derived parity: OK."

      - name: Verify every hook is executable
        run: |
          set -e
          for h in .kimi/hooks/*.sh; do
            if [ ! -x "$h" ]; then
              echo "FAIL: $h missing +x bit (Kimi cannot invoke it)"
              exit 1
            fi
          done
          echo "All hooks executable."

      - name: Smoke-test each hook with a minimal payload
        run: |
          set -e
          # Inputs that should be allowed (exit 0)
          echo '{}' | .kimi/hooks/session-start.sh > /dev/null
          echo '{}' | .kimi/hooks/session-end.sh
          echo '{}' | .kimi/hooks/pre-compact.sh > /dev/null
          echo '{}' | .kimi/hooks/stop.sh > /dev/null
          echo '{}' | .kimi/hooks/notification.sh
          echo '{"tool_name":"WriteFile","tool_input":{"file_path":"README.md","content":"safe"}}' \
            | .kimi/hooks/pre-tool-use.sh > /dev/null
          echo '{"tool_name":"Shell","tool_input":{"command":"ls -la"}}' \
            | .kimi/hooks/pre-shell.sh > /dev/null
          # Inputs that MUST block (exit 2)
          if echo '{"tool_name":"WriteFile","tool_input":{"file_path":".env"}}' \
             | .kimi/hooks/pre-tool-use.sh > /dev/null 2>&1; then
            echo "FAIL: pre-tool-use.sh did not block .env"; exit 1
          fi
          if echo '{"tool_name":"Shell","tool_input":{"command":"echo TOKEN > .env"}}' \
             | .kimi/hooks/pre-shell.sh > /dev/null 2>&1; then
            echo "FAIL: pre-shell.sh did not block redirect to .env"; exit 1
          fi
          echo "All hook smoke tests pass."

      - name: Run integrity checks
        run: bash SYSTEM_INTEGRITY_CHECK.sh
