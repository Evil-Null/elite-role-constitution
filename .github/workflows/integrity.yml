name: Integrity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity:
    name: SYSTEM_INTEGRITY_CHECK.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify shellcheck is available
        run: shellcheck --version

      - name: Install python yaml for generator
        run: python3 -m pip install --quiet pyyaml

      - name: Static-analyze every shell script in the repo
        run: shellcheck SYSTEM_INTEGRITY_CHECK.sh install.sh generate.sh build-tier2-bundle.sh tests/hook-pattern-smoke.sh tests/compliance-smoke.sh scripts/compliance_report.sh scripts/compliance_dashboard.sh scripts/compliance_alert.sh .kimi/hooks/*.sh

      - name: Verify canon and derived files are in sync
        run: |
          set -e
          bash generate.sh --check
          # Belt-and-braces: assert no diff after a real run.
          bash generate.sh
          if ! git diff --exit-code; then
            echo "FAIL: generate.sh produced uncommitted diffs."
            echo "Run 'bash generate.sh' locally and commit the result,"
            echo "or revert manual edits to canon-generated blocks."
            exit 1
          fi
          echo "Canon to derived parity: OK."

      - name: Verify every hook is executable
        run: |
          set -e
          for h in .kimi/hooks/*.sh; do
            if [ ! -x "$h" ]; then
              echo "FAIL: $h missing +x bit (Kimi cannot invoke it)"
              exit 1
            fi
          done
          echo "All hooks executable."

      - name: Hook pattern coverage smoke tests
        run: bash tests/hook-pattern-smoke.sh

      - name: Compliance scripts smoke (F1+F2+F3)
        run: bash tests/compliance-smoke.sh

      - name: Run integrity checks
        run: bash SYSTEM_INTEGRITY_CHECK.sh
