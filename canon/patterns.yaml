# canon/patterns.yaml — Protected-file patterns + secret-content regexes
#
# Single source of truth. Consumers:
#   - .kimi/hooks/_patterns.sh (sourced by pre-tool-use.sh and pre-shell.sh)
#
# Edit here, then `bash generate.sh`. Both hooks pick up changes via the
# regenerated _patterns.sh — no duplication.
#
# History: pre-tool-use.sh and pre-shell.sh used to maintain separate copies.
# pre-shell.sh quietly missed *.credentials.*, secring.gpg, gcloud-key*.json
# (security-relevant divergence). This file collapses them.

# Glob patterns matched (case-insensitive) against the basename AND the
# readlink-resolved path. If either matches, the operation is BLOCKED.
protected_files:
  # Block list — these basenames/paths are NEVER writable by the agent.
  block:
    # Environment files
    - "*.env"
    - "*.env.*"
    - "*.envrc"
    - "*.envrc.*"
    # Credentials (basename and path-level)
    - "*credentials"
    - "*credentials.*"
    - "*.credentials"
    - "*.credentials.*"
    # SSH keys
    - "id_rsa*"
    - "id_dsa*"
    - "id_ecdsa*"
    - "id_ed25519*"
    - "*authorized_keys*"
    # Certificates and keys
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"
    - "*.crt"
    - "*.cer"
    - "*.jks"
    # GPG / PGP
    - "*.gpg"
    - "*.asc"
    - "secring.gpg"
    # Misc credential stores
    - "*.netrc"
    - "*pgpass*"
    - "*.npmrc"
    - "*.pypirc"
    # Cloud
    - "*kubeconfig*"
    - "gcloud-key*.json"
    - "*service-account*.json"
    # Infrastructure state
    - "*terraform.tfstate"
    - "*.tfstate"
    - "*.tfstate.*"

  # Whitelist — these names are conventionally checked into repos as
  # examples/placeholders, NOT real secrets. The block list above must
  # NOT match these.
  whitelist:
    - "*.env.example"
    - "*.env.sample"
    - "*.env.template"
    - "*.env.dist"
    - "*.env.test"
    - ".env.example"
    - "credentials.example.*"

# Catastrophic absolute paths. Matched as FULL paths (not glob basenames)
# against the arguments of destructive shell commands (rm, shred, truncate,
# chmod, chown). Even a single argument matching this list blocks the
# command outright — these are paths whose deletion or permission change
# would brick the host or wipe user state.
catastrophic_paths:
  - "/"
  - "/etc"
  - "/var"
  - "/usr"
  - "/bin"
  - "/sbin"
  - "/lib"
  - "/lib64"
  - "/boot"
  - "/sys"
  - "/proc"
  - "/dev"
  - "/root"
  - "/home"
  - "/opt"

# Regex set matched against proposed file *content* (WriteFile body,
# StrReplaceFile new_string, etc.). If any matches, the write is BLOCKED.
# Each entry: {name, regex, source}.
secrets:
  - name: aws_access_key
    regex: 'AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}'
    source: "AWS Identity Access Management (long-term + temporary STS keys)"

  - name: openai_legacy
    regex: 'sk-(ant-)?[A-Za-z0-9_-]{20,}'
    source: "OpenAI legacy + Anthropic sk-ant- keys (same prefix shape)"

  - name: openai_project
    regex: 'sk-proj-[A-Za-z0-9_-]{20,}'
    source: "OpenAI project-scoped key"

  - name: github_pat_classic
    regex: 'gh[pousr]_[A-Za-z0-9]{36,}'
    source: "GitHub classic PAT (ghp_, gho_, ghu_, ghs_, ghr_ prefixes)"

  - name: github_pat_fine
    regex: 'github_pat_[A-Za-z0-9_]{36,}'
    source: "GitHub fine-grained personal access token"

  - name: google_api_key
    regex: 'AIza[0-9A-Za-z_-]{35}'
    source: "Google API / Maps / GCP service key"

  - name: slack_token
    regex: 'xox[abprs]-[A-Za-z0-9-]{10,}'
    source: "Slack bot / user / refresh / webhook tokens"

  - name: stripe_live
    regex: 'sk_live_[A-Za-z0-9]{20,}'
    source: "Stripe live secret key (test keys sk_test_ deliberately allowed for fixtures)"

  - name: pem_private_key
    regex: '-----BEGIN ([A-Z]+ ){0,2}PRIVATE KEY( BLOCK)?-----'
    source: "PEM private key header — RSA, DSA, EC, OPENSSH, ENCRYPTED, PGP variants"
