timeout = 15

# Append one line to .kimi/audit/post-tool-use-YYYYMMDD.log (host-wide audit per KIMI_PROTOCOL.md §H.0)
[[hooks]]
event = "PostToolUse"
matcher = "WriteFile|StrReplaceFile|Shell"
command = ".kimi/hooks/post-tool-use.sh"
timeout = 5

# Emit L6 anti-self-deception reminder (Phase C upgrades to real verification once Kimi payload schema confirmed)
[[hooks]]
