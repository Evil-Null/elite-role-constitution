# .kimi/hooks.example.toml — regenerated by generate.sh from canon/hooks.yaml
# DO NOT EDIT — run `bash generate.sh` instead.
#
# Append the [[hooks]] blocks below to your ~/.kimi/config.toml.
# install.sh does this automatically (with a config.toml backup first).
#
# Hook protocol summary:
#   stdin:  JSON event payload
#   exit 0: allow (stdout appended to agent context)
#   exit 2: block (stderr fed back to the LLM as correction)
#   other:  allow with stderr logged only

# Inject memory/{README,RESUME,CONTEXT,ASSUMPTIONS}.md into the new session's context (capped to MAX_INLINE_LINES per file)
[[hooks]]
event = "SessionStart"
matcher = ""
command = ".kimi/hooks/session-start.sh"
timeout = 10

# Idempotent timestamp update on memory/RESUME.md via same-FS tempfile + atomic mv (R2 #5 fix)
[[hooks]]
event = "SessionEnd"
matcher = ""
command = ".kimi/hooks/session-end.sh"
timeout = 10

# Emit reminder of SESSION_RITUAL.md Ritual 3 (agent must write memory/COMPACT_STATE.md before compact proceeds)
[[hooks]]
event = "PreCompact"
matcher = ""
command = ".kimi/hooks/pre-compact.sh"
timeout = 10

# BLOCK (exit 2) if memory/COMPACT_STATE.md is missing per L1 UNKNOWN=STOP; verify task-token match against CONTEXT.md
[[hooks]]
event = "PostCompact"
matcher = ""
command = ".kimi/hooks/post-compact.sh"
timeout = 10

# Fail-closed on JSON parse error (R3 #1); resolve symlinks; case-insensitive protected-file match; V3 secret-pattern scan on content
[[hooks]]
event = "PreToolUse"
matcher = "WriteFile|StrReplaceFile|MultiEdit"
command = ".kimi/hooks/pre-tool-use.sh"
timeout = 15

# Parse Shell command via python shlex; block if any redirect/copy/move/sed target matches the protected pattern set (R3 #3 closure)
[[hooks]]
event = "PreToolUse"
matcher = "Shell"
command = ".kimi/hooks/pre-shell.sh"
timeout = 15

# Append one line to .kimi/audit/post-tool-use-YYYYMMDD.log (host-wide audit per KIMI_PROTOCOL.md §H.0)
[[hooks]]
event = "PostToolUse"
matcher = "WriteFile|StrReplaceFile|Shell"
command = ".kimi/hooks/post-tool-use.sh"
timeout = 5

# Emit L6 anti-self-deception reminder (Phase C upgrades to real verification once Kimi payload schema confirmed)
[[hooks]]
event = "Stop"
matcher = ""
command = ".kimi/hooks/stop.sh"
timeout = 5

# Desktop notification: notify-send (Linux), osascript argv (macOS, injection-safe per R2 #1), stderr fallback
[[hooks]]
event = "Notification"
matcher = ""
command = ".kimi/hooks/notification.sh"
timeout = 5
